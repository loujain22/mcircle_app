
name: mcircle_app
description: "A new Flutter project."


publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'


#----------------- PACKAGES ---------------#
dependencies:
  flutter:
    sdk: flutter
# State Management    
  get: ^4.6.6
  get_storage: ^2.1.1

# Utility Packages
  http: ^1.2.0
  intl: ^0.19.0
  logger: ^2.4.0
  url_launcher: ^6.3.0
  flutter_native_splash: ^2.4.3
  smooth_page_indicator: ^1.2.0+3
  iconsax_flutter: ^1.0.0
  animated_splash_screen: ^1.3.0
  image_picker: ^1.2.1
  dotted_border: ^3.1.0
  flutter_staggered_grid_view: ^0.7.0


  
# Icons
cupertino_icons: ^1.0.2




#-----------------  ./ PACKAGES END ---------------#


dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true





  
#---------------- LOCAL ASSETS ---------------#
  
  assets:  
    - assets/
    - assets/logos/
    - assets/images/
    - assets/products_card/
    - assets/social_images/
    - assets/categories/
    - assets/images/onboarding_images/
  
#---------------- LOCAL FONTS ---------------#

  fonts:
   - family: Inter
     fonts:
      - asset: assets/fonts/Inter-Thin.otf
        weight: 100
      - asset: assets/fonts/Inter-Light.otf
        weight: 300
      - asset: assets/fonts/Inter-Regular.otf
        weight: 400
      - asset: assets/fonts/Inter-Medium.otf
        weight: 500
      - asset: assets/fonts/Inter-SemiBold.otf
        weight: 600
      - asset: assets/fonts/Inter-Bold.otf
        weight: 700
      - asset: assets/fonts/Inter-ExtraBold.otf
        weight: 800
          
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/rounded_logo.png"



  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
